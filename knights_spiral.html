<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="chrome=1, IE=edge">
  <title>Knights Spiral</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a8a4a;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .ctrl_btn {
      position: fixed;
      z-index: 10;
      padding: 8px 16px;
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      color: #f8f4ec;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,230,0,0.7);
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }
    .ctrl_btn:hover {
      background: rgba(0,0,0,0.78);
    }
    #speed_btn    { right: 14px; bottom: 14px; }
    #dump_btn     { right: 14px; bottom: 56px; }
    #save_img_btn { right: 14px; bottom: 14px; display: none; }
    #help_box     { display: none; }
  </style>
  <script src="knights_spiral.js"></script>
</head>
<body onload="knights_spiral.start()" onresize="knights_spiral.resize()">
  <canvas id="board"></canvas>
  <button id="speed_btn"    class="ctrl_btn" onclick="knights_spiral.toggle_speed()">FAST</button>
  <button id="dump_btn"     class="ctrl_btn" onclick="knights_spiral.download_sequences()">SAVE SEQUENCES</button>
  <button id="save_img_btn" class="ctrl_btn" onclick="knights_spiral.save_image()">SAVE IMAGE</button>
  <!--
    URL parameters:
      ?pieces=knight,rook,bishop   piece types in turn order (1-7 pieces)
      &start=0,1,2                 starting spiral indices (must match piece count)
      &moves=number                stop after this many moves
      &size=number                 max board side (odd, 5..2001; default 2001)
    Piece types: knight · rook · bishop · camel · zebra · giraffe · antelope
    Default: knight,knight  (stranded mode)
  -->
  <div id="help_box"></div>
</body>
</html>
